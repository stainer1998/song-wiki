services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: song_wiki
      POSTGRES_USER: song_wiki
      POSTGRES_PASSWORD: song_wiki_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U song_wiki"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
      - media_files:/app/media
    ports:
      - "8000:8000"
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
      DATABASE_URL: postgres://song_wiki:song_wiki_pass@db:5432/song_wiki
      SECRET_KEY: dev-only-secret-key-change-in-production
      DEBUG: "True"
      ALLOWED_HOSTS: "localhost,127.0.0.1,backend"
      MEDIA_ROOT: /app/media
      DJANGO_SUPERUSER_USERNAME: admin
      DJANGO_SUPERUSER_EMAIL: admin@songwiki.local
      DJANGO_SUPERUSER_PASSWORD: admin1234
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    volumes:
      - ./frontend/src:/app/src
    ports:
      - "5173:5173"
    environment:
      VITE_API_TARGET: http://backend:8000
    depends_on:
      - backend

volumes:
  postgres_data:
  media_files:
